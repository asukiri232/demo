<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Банкетам.Нет{% endblock %}</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card: #ffffff;
            --accent: #8b4513;
            --accent-hover: #6d3610;
            --text: #2c2416;
            --muted: #6b5d4f;
            --error: #b33a3a;
            --border: #ddd5cc;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .header {
            background: linear-gradient(135deg, #5c3d2e 0%, #8b4513 100%);
            color: #fff;
            padding: 1.25rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,.12);
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }
        .header p {
            margin: .25rem 0 0;
            opacity: .9;
            font-size: .9rem;
        }
        main {
            max-width: 520px;
            margin: 2rem auto;
            padding: 0 1rem 3rem;
        }
        main.main--wide {
            max-width: 720px;
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .header-nav {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: .9rem;
        }
        .header-nav a {
            color: #fff;
            text-decoration: none;
            opacity: .95;
        }
        .header-nav a:hover { text-decoration: underline; }
        .header-nav .header-nav__user {
            opacity: .85;
            font-size: .85rem;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(44, 36, 22, .08);
            border: 1px solid var(--border);
        }
        .card h2 {
            margin: 0 0 1.5rem;
            font-size: 1.35rem;
            color: var(--accent);
        }
        .field { margin-bottom: 1.25rem; }
        .field label {
            display: block;
            font-weight: 600;
            margin-bottom: .35rem;
            font-size: .9rem;
        }
        .field input {
            width: 100%;
            padding: .65rem .85rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
        }
        .field input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(139, 69, 19, .15);
        }
        .helptext {
            display: block;
            margin-top: .25rem;
            font-size: .8rem;
            color: var(--muted);
        }
        .errorlist {
            margin: .35rem 0 0;
            padding: 0;
            list-style: none;
            color: var(--error);
            font-size: .85rem;
        }
        .non-field-errors {
            background: #fdeaea;
            border: 1px solid #f5c6c6;
            border-radius: 8px;
            padding: .75rem 1rem;
            margin-bottom: 1rem;
            color: var(--error);
            font-size: .9rem;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: .75rem 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: .5rem;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn--outline {
            width: auto;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            margin-top: 0;
        }
        .btn--outline:hover {
            background: var(--accent);
            color: #fff;
        }
        .cabinet { display: flex; flex-direction: column; gap: 1.25rem; }
        .cabinet-welcome {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .cabinet-welcome h2 { margin-bottom: .5rem; }
        .cabinet-greeting { margin: 0 0 .35rem; font-size: 1.05rem; }
        .cabinet-subtitle {
            margin: 0;
            color: var(--muted);
            font-size: .9rem;
            max-width: 28rem;
        }
        .cabinet-logout-form { flex-shrink: 0; }
        .card-section-title {
            margin: 0 0 1.25rem;
            font-size: 1.1rem;
            color: var(--accent);
            font-weight: 600;
        }
        .card--muted { background: #faf8f6; }
        .profile-list {
            margin: 0;
            display: grid;
            gap: 1rem;
        }
        .profile-list__row {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: .5rem 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .profile-list__row:last-child {
            padding-bottom: 0;
            border-bottom: none;
        }
        .profile-list dt {
            margin: 0;
            font-size: .85rem;
            font-weight: 600;
            color: var(--muted);
        }
        .profile-list dd {
            margin: 0;
            font-size: 1rem;
        }
        .cabinet-placeholder {
            margin: 0;
            color: var(--muted);
            font-size: .9rem;
        }
        @media (max-width: 480px) {
            .profile-list__row {
                grid-template-columns: 1fr;
            }
        }
        .messages {
            list-style: none;
            padding: 0;
            margin: 0 0 1rem;
        }
        .messages li {
            padding: .75rem 1rem;
            border-radius: 8px;
            background: #e8f5e9;
            color: #2e7d32;
            font-size: .9rem;
        }
        .success-text { text-align: center; }
        .success-text p { color: var(--muted); }
        a { color: var(--accent); }
        .nav-link {
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: .9rem;
            color: var(--muted);
        }
        .nav-link a {
            font-weight: 600;
            text-decoration: none;
        }
        .nav-link a:hover { text-decoration: underline; }
        .messages .error {
            background: #fdeaea;
            color: var(--error);
        }
        .messages .info {
            background: #e3f2fd;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div>
                <h1>Банкетам.Нет</h1>
                <p>Бронирование помещений для банкетов</p>
            </div>
            {% if user.is_authenticated %}
            <nav class="header-nav">
                <span class="header-nav__user">{{ user.full_name }}</span>
                <a href="{% url 'cabinet' %}">Личный кабинет</a>
            </nav>
            {% endif %}
        </div>
    </header>
    <main class="{% block main_class %}{% endblock %}">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
